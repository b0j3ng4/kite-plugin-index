name: Unit tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
